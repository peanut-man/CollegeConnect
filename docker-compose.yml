services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/college-connect
      - REDIS_URL=redis://redis:6379
    volumes:
      - backend_uploads:/app/uploads

  worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/college-connect
      - REDIS_URL=redis://redis:6379
    command: ["node", "workers/notification.worker.js"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  backend_uploads:
